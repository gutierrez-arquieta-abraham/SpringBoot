spring.application.name=demo

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Usamos variables para proteger tus credenciales de AWS
spring.datasource.url=jdbc:mysql://${AWS_HOST}:3306/POLICODELABS?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${AWS_USER}
spring.datasource.password=${AWS_PASS}

spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.show-sql=true    